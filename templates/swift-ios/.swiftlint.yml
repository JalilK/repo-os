included:
  - App
  - Features
  - Core
  - Tests

excluded:
  - .build
  - DerivedData
  - .git
  - APPNAME.xcodeproj

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - modifier_order
  - redundant_nil_coalescing
  - sorted_imports
  - toggle_bool
  - unneeded_parentheses_in_closure_argument

line_length:
  warning: 140
  error: 180
  ignores_comments: true
  ignores_urls: true

reporter: "github-actions-logging"
strict: true
